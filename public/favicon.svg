<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muyideen Morenigbade terminal monogram">
  <!-- Terminal concept mark: phosphor-green prompt + MM + cursor on a dark chip -->
  <rect x="16" y="16" width="208" height="208" rx="26" fill="#11161f" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- title-bar dots -->
  <g>
    <circle cx="46" cy="46" r="5" fill="#2a333f"/>
    <circle cx="64" cy="46" r="5" fill="#2a333f"/>
    <circle cx="82" cy="46" r="5" fill="#2a333f"/>
  </g>
  <!-- prompt + monogram -->
  <g font-family="'JetBrains Mono','Geist Mono',ui-monospace,monospace" font-weight="700" font-size="62">
    <text x="40" y="150" fill="#4ade80">&gt;</text>
    <text x="82" y="150" fill="#c9d1d9" letter-spacing="-1">MM</text>
  </g>
  <!-- blinking cursor -->
  <rect x="172" y="118" width="26" height="40" rx="2" fill="#4ade80">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
